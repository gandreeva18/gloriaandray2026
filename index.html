<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gloria & Ray - We're Getting Married!</title>
    <style>
        /* Typography: Bodoni Moda (Variable with Italics) and Tenor Sans */
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Tenor+Sans&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tenor Sans', sans-serif;
            color: #333;
            background-color: #fff;
            display: flex;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        /* Split Screen Layout */
        .container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            background: #fff;
            overflow: hidden;
            position: relative;
        }

        .left-photo {
            flex: 2;
            background-image: url('https://images.unsplash.com/photo-1519741497674-611481863552?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
            min-height: 100vh;
        }

        .left-photo::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.15);
        }

        .photo-text {
            position: absolute;
            bottom: 50px;
            left: 50px;
            color: white;
            text-shadow: 1px 1px 12px rgba(0,0,0,0.6);
            z-index: 5;
        }

        .photo-text h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 500;
            letter-spacing: 1px;
            line-height: 1;
        }

        .photo-text h2 span.amp {
            font-style: italic;
            font-family: 'Bodoni Moda', serif;
            margin: 0 5px;
            font-weight: 400;
        }

        .photo-text p {
            font-size: 1.3rem;
            margin-top: 10px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .right-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            background-color: #f8f8f8;
            position: relative;
            z-index: 5;
            min-height: 100vh;
        }

        /* Fullscreen Particle Canvas */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .leaf-graphic {
            font-size: 2.2rem;
            color: #7793c2; 
            margin: 10px 0;
            opacity: 0.7;
            user-select: none;
        }

        /* Info Box Styling */
        .info-box {
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(119, 147, 194, 0.1);
            border-radius: 12px;
            padding: 30px 20px;
            width: 100%;
            max-width: 320px;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .save-the-date {
            font-family: 'Bodoni Moda', serif;
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #7793c2;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .names-subtitle {
            font-family: 'Bodoni Moda', serif;
            font-size: 2.2rem;
            color: #222;
            letter-spacing: 1px;
            margin-top: -5px;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .amp {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 1.1em;
            margin: 0 2px;
        }

        .date-text {
            font-size: 1rem;
            font-weight: 400;
            color: #7793c2;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
            width: 80%;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .location-text {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: #555;
            line-height: 1.4;
            width: 80%;
        }

        .countdown {
            font-size: 0.8rem;
            color: #777;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px solid rgba(0,0,0,0.05);
            padding: 8px 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.4);
            display: inline-block;
        }

        #rsvpTrigger {
            background-color: transparent;
            border: 1.5px solid #7793c2;
            color: #7793c2;
            padding: 10px 30px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            border-radius: 4px;
            margin-top: 10px;
            font-family: 'Tenor Sans', sans-serif;
        }

        #rsvpTrigger:hover {
            background-color: rgba(119, 147, 194, 0.05);
            box-shadow: 0 4px 12px rgba(119, 147, 194, 0.1);
        }

        .rsvp-section {
            width: 100%;
            max-width: 280px;
            padding-top: 15px;
            display: none; 
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .rsvp-section.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .rsvp-section h3 {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 400;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            font-family: 'Tenor Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            background-color: #fff;
        }

        input:focus, select:focus {
            border-color: #7793c2;
        }

        /* Submit Button logic */
        #submitBtn {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #7793c2;
            border: 1.5px solid #7793c2;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Tenor Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        #submitBtn:hover {
            background-color: rgba(119, 147, 194, 0.05);
        }

        #submitBtn.sent {
            background-color: #7793c2;
            color: white;
            cursor: default;
        }

        #addGuestBtn {
            width: 100%;
            background: none;
            border: 1px dashed #7793c2;
            color: #7793c2;
            padding: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 15px;
            border-radius: 4px;
            display: none;
            font-family: 'Tenor Sans', sans-serif;
        }

        #addGuestBtn.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        #rsvpMessage {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            line-height: 1.4;
            display: none;
            text-align: center;
        }

        .success-msg { 
            background-color: #f0f4fa;
            color: #455a7a;
            border: 1px solid #d1dde6; 
        }

        .website-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #7793c2;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .left-photo { min-height: 50vh; }
            .right-content { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="particleCanvas"></canvas>

        <div class="left-photo">
            <div class="photo-text">
                <h2>Gloria <span class="amp">&</span> Ray</h2>
                <p>We're getting married!</p>
            </div>
        </div>
        
        <div class="right-content">
            <div class="leaf-graphic">🌿</div>
            
            <div class="info-box">
                <div class="save-the-date">SAVE THE DATE</div>
                <div class="names-subtitle">Gloria <span class="amp">&</span> Ray</div>
                <div class="date-text">August 2, 2026</div>
                <div class="location-text">Sofia, Bulgaria</div>
                <div class="countdown" id="countdownTimer">Loading...</div>
                <button id="rsvpTrigger">RSVP</button>
            </div>

            <div class="rsvp-section" id="rsvpContainer">
                <h3>RSVP</h3>
                <form id="rsvpForm">
                    <div class="form-group">
                        <input type="text" id="guestName" name="guestName" placeholder="First & Last Name" required>
                    </div>
                    <div class="form-group">
                        <select id="attendance" name="attendance" required>
                            <option value="" disabled selected>Will you attend?</option>
                            <option value="Joyfully Accepts">Joyfully Accepts</option>
                            <option value="Regretfully Declines">Regretfully Declines</option>
                        </select>
                    </div>
                    <div id="additionalGuestsContainer"></div>
                    <button type="button" id="addGuestBtn">Add + One Guest</button>
                    <button type="submit" id="submitBtn">Send RSVP</button>
                </form>
                <div id="rsvpMessage"></div>
            </div>
            
            <div class="leaf-graphic" style="transform: scaleX(-1);">🌿</div>
        </div>
    </div>

    <script>
        // Countdown Logic (Target: 17:00)
        const weddingDate = new Date("August 2, 2026 17:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            if (distance < 0) {
                document.getElementById("countdownTimer").innerHTML = "The Big Day is Here!";
                return;
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("countdownTimer").innerHTML = `${days} Days &nbsp; ${hours} Hrs &nbsp; ${minutes} Min`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // UI Interactions
        const rsvpTrigger = document.getElementById('rsvpTrigger');
        const rsvpContainer = document.getElementById('rsvpContainer');
        const attendanceSelect = document.getElementById('attendance');
        const addGuestBtn = document.getElementById('addGuestBtn');
        const additionalGuestsContainer = document.getElementById('additionalGuestsContainer');

        rsvpTrigger.addEventListener('click', () => {
            rsvpTrigger.style.display = 'none';
            rsvpContainer.style.display = 'block';
            setTimeout(() => rsvpContainer.classList.add('show'), 10);
        });

        attendanceSelect.addEventListener('change', () => {
            if (attendanceSelect.value === 'Joyfully Accepts') {
                addGuestBtn.classList.add('visible');
            } else {
                addGuestBtn.classList.remove('visible');
                additionalGuestsContainer.innerHTML = '';
            }
        });

        addGuestBtn.addEventListener('click', () => {
            if (additionalGuestsContainer.children.length === 0) {
                const group = document.createElement('div');
                group.className = 'form-group';
                group.innerHTML = `<input type="text" name="plusOne" placeholder="Plus One's Name" required>`;
                additionalGuestsContainer.appendChild(group);
                addGuestBtn.style.display = 'none';
            }
        });

        // Form Submission
        const form = document.getElementById('rsvpForm');
        const submitBtn = document.getElementById('submitBtn');
        const rsvpMessage = document.getElementById('rsvpMessage');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.innerText = "Sending...";
            
            // Simulating successful submit
            setTimeout(() => {
                submitBtn.classList.add('sent');
                submitBtn.innerText = "RSVP Sent";
                submitBtn.disabled = true;

                let msg = "RSVP successfully sent!<br>See you in Sofia!";
                if (attendanceSelect.value === 'Joyfully Accepts') {
                    msg += `<br><a href="wedding_details.html" class="website-link">Our Wedding Website</a>`;
                }
                
                rsvpMessage.innerHTML = msg;
                rsvpMessage.className = "success-msg";
                rsvpMessage.style.display = 'block';
                form.style.display = 'none';
                document.querySelector('.rsvp-section h3').style.display = 'none';
            }, 1500);
        });

        // Particle Animation (White dots, translucent)
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 60;

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 2 + 1;
                this.speed = Math.random() * 0.4 + 0.1;
                this.opacity = Math.random() * 0.15 + 0.05;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -10) this.init();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            resizeCanvas();
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
            animate();
        };
        window.onresize = resizeCanvas;
    </script>
</body>
</html>
